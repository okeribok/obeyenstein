<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RVB AI Obeya Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #161616;
  color: #d0d0d0;
  font-family: 'Courier New', monospace;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}

/* ── TOOLBAR ── */
#toolbar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  background: #0e0e0e;
  border-bottom: 1px solid #2a2a2a;
  flex-shrink: 0;
  flex-wrap: wrap;
  min-height: 42px;
}

#toolbar h1 {
  font-size: 12px;
  color: #00e5ff;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-right: 4px;
  white-space: nowrap;
}

.sep { width: 1px; height: 18px; background: #333; margin: 0 2px; }

.tb-btn {
  padding: 3px 9px;
  border-radius: 2px;
  cursor: pointer;
  font-family: 'Courier New', monospace;
  font-size: 11px;
  border: 1px solid currentColor;
  background: transparent;
  color: #888;
  transition: color 0.15s, box-shadow 0.15s, opacity 0.15s;
  white-space: nowrap;
}
.tb-btn:hover { color: #ccc; }
.tb-btn.zoom { color: #00e5ff; border-color: #00e5ff33; }
.tb-btn.zoom:hover { border-color: #00e5ff88; }

#zoom-pct { font-size: 11px; color: #555; min-width: 38px; text-align: center; }

/* Layer buttons — each its own hue */
.layer-btn {
  opacity: 0.45;
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 2px;
  cursor: pointer;
  font-family: 'Courier New', monospace;
  border: 1px solid currentColor;
  background: transparent;
  transition: opacity 0.15s, box-shadow 0.15s;
  white-space: nowrap;
}
.layer-btn:hover { opacity: 0.75; }
.layer-btn.on {
  opacity: 1;
  box-shadow: 0 0 8px currentColor, inset 0 0 8px rgba(255,255,255,0.04);
}

.l-jur  { color: #ff4d4d; }
.l-tech { color: #ff9500; }
.l-str  { color: #ffd700; }
.l-mens { color: #44dd77; }
.l-gov  { color: #4499ff; }
.l-inn  { color: #cc44ff; }

#toolbar-right { margin-left: auto; font-size: 10px; color: #444; display: flex; align-items: center; gap: 8px; }

/* ── BOARD ── */
#board-wrapper {
  flex: 1;
  overflow: scroll;
  background: #222;
  scrollbar-width: thin;
  scrollbar-color: #333 #1a1a1a;
}

#board-container {
  position: relative;
  width: 2400px;          /* initial display width; JS adjusts */
  display: inline-block;
}

#base-img {
  width: 100%;
  display: block;
  pointer-events: none;
}

#overlay {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  overflow: visible;
}

/* ── TOOLTIP ── */
#tooltip {
  position: fixed;
  padding: 5px 10px;
  background: #0a0a0a;
  border: 1px solid #00e5ff55;
  border-radius: 2px;
  font-size: 11px;
  color: #d0d0d0;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.1s;
  white-space: nowrap;
  z-index: 200;
  font-family: 'Courier New', monospace;
}
#tooltip.vis { opacity: 1; }

/* ── LEGEND ── */
#legend {
  position: fixed;
  bottom: 10px;
  right: 10px;
  background: rgba(8,8,8,0.88);
  border: 1px solid #2a2a2a;
  border-radius: 3px;
  padding: 8px 12px;
  font-size: 10px;
  line-height: 1.9;
  z-index: 150;
  color: #888;
  min-width: 160px;
}
#legend strong {
  display: block;
  font-size: 10px;
  color: #00e5ff;
  letter-spacing: 0.08em;
  margin-bottom: 2px;
  text-transform: uppercase;
}
.leg-row { display: flex; align-items: center; gap: 6px; }
.leg-circ {
  width: 12px; height: 12px;
  border-radius: 50%;
  border: 2px solid #00e5ff;
  background: rgba(0,229,255,0.25);
  flex-shrink: 0;
}
.leg-circ.sm {
  width: 8px; height: 8px;
  background: rgba(0,229,255,0.12);
}
</style>

<div id="tooltip"></div>

<div id="legend">
  <strong>Magneten</strong>

  <div class="leg-row"><div class="leg-circ sm"></div>+6 maanden prognose</div>
  <div style="margin-top:6px;font-size:9px;color:#444">klik = +1 niveau<br>shift+klik = −1 niveau</div>
</div>

<script>
// ══ DATA ══

const LEVEL_X = [314, 412, 551, 691, 831, 972];
const LEVEL_NAMES = ['0 – Initieel', '1 – Bewust', '2 – Gestructureerd',
                     '3 – Geoptimaliseerd', '4 – Datagedreven', '5 – Lerend'];

// Lane y-center based on parsed SVG text positions
const LANES = [
  { name: 'strategie & beleid',      icon: '♟', y: 126, current: 2, future: 3 },
  { name: 'mens & cultuur',          icon: '❣', y: 183, current: 1, future: 2 },
  { name: 'inzet & organisatie',     icon: '⛓', y: 245, current: 1, future: 1 },
  { name: 'training',                icon: '⚗', y: 299, current: 2, future: 4 },
  { name: 'governance & sturing',    icon: '✒', y: 361, current: 2, future: 3 },
  { name: 'informatietechnologie',   icon: '⌨', y: 422, current: 3, future: 4 },
  { name: 'data',                    icon: '⚱', y: 470, current: 1, future: 2 },
  { name: 'ethiek & responsible AI', icon: '⚖', y: 537, current: 2, future: 2 },
  { name: 'betrouwbare overheid',    icon: '☂', y: 594, current: 2, future: 3 },
  { name: 'waarde & impact',         icon: '☀', y: 652, current: 1, future: 2 },
];

const R_CURRENT = 24;   // SVG units
const R_FUTURE  = 13;

// ══ STATE ══
const activeLayers = new Set();
let magnetsVisible = true;
let boardWidth = 2400;
const MIN_W = 800, MAX_W = 7000;

// ══ RENDER MAGNETS ══
function renderMagnets() {
  const g = document.getElementById('magnets-group');
  g.innerHTML = '';
  if (!magnetsVisible) return;

  LANES.forEach((lane, i) => {
    const cx_cur = LEVEL_X[lane.current];
    const cx_fut = LEVEL_X[lane.future];
    const cy = lane.y;

    // Current level magnet
    const cur = makeMagnet(cx_cur, cy, R_CURRENT, false, i, 'current');
    g.appendChild(cur);

    // Future magnet (only if different from current)
    if (lane.future !== lane.current) {
      const fut = makeMagnet(cx_fut, cy, R_FUTURE, true, i, 'future');
      g.appendChild(fut);

      // Arrow connecting current → future
      const arrow = makeArrow(cx_cur, cy, cx_fut, cy);
      g.appendChild(arrow);
    }
  });
}

function makeMagnet(cx, cy, r, isFuture, laneIdx, kind) {
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.style.cursor = 'pointer';

  // Outer glow ring
  const ring = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  ring.setAttribute('cx', cx);
  ring.setAttribute('cy', cy);
  ring.setAttribute('r', r + 4);
  ring.setAttribute('fill', 'none');
  ring.setAttribute('stroke', '#00e5ff');
  ring.setAttribute('stroke-width', '1');
  ring.setAttribute('opacity', '0.2');
  if (isFuture) {
    ring.setAttribute('stroke-dasharray', '4,3');
  }
  g.appendChild(ring);

  // Main circle
  const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  c.setAttribute('cx', cx);
  c.setAttribute('cy', cy);
  c.setAttribute('r', r);
  c.setAttribute('fill', isFuture ? 'rgba(0,229,255,0.12)' : 'rgba(0,229,255,0.28)');
  c.setAttribute('stroke', '#00e5ff');
  c.setAttribute('stroke-width', isFuture ? '1.5' : '2.5');
  if (isFuture) c.setAttribute('stroke-dasharray', '5,3');
  c.setAttribute('filter', isFuture ? 'url(#cyan-glow-sm)' : 'url(#cyan-glow)');
  g.appendChild(c);

  // Level number inside
  const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  t.setAttribute('x', cx);
  t.setAttribute('y', cy + (r < 16 ? 4 : 5));
  t.setAttribute('text-anchor', 'middle');
  t.setAttribute('dominant-baseline', 'middle');
  t.setAttribute('font-family', 'Courier New, monospace');
  t.setAttribute('font-size', isFuture ? '12' : '16');
  t.setAttribute('font-weight', '700');
  t.setAttribute('fill', '#00e5ff');
  t.setAttribute('opacity', isFuture ? '0.7' : '1');
  t.setAttribute('pointer-events', 'none');
  const lvlNum = isFuture ? LANES[laneIdx].future : LANES[laneIdx].current;
  t.textContent = lvlNum;
  g.appendChild(t);

  // Interaction
  g.addEventListener('mouseenter', (e) => {
    c.setAttribute('fill', isFuture ? 'rgba(0,229,255,0.22)' : 'rgba(0,229,255,0.42)');
    const lane = LANES[laneIdx];
    const lvl = kind === 'current' ? lane.current : lane.future;
    showTooltip(e, `${lane.icon} ${lane.name} → ${LEVEL_NAMES[lvl]}${isFuture ? ' (+6m)' : ' (nu)'}`);
  });
  g.addEventListener('mouseleave', () => {
    c.setAttribute('fill', isFuture ? 'rgba(0,229,255,0.12)' : 'rgba(0,229,255,0.28)');
    hideTooltip();
  });
  g.addEventListener('mousemove', moveTooltip);
  g.addEventListener('click', (e) => {
    e.stopPropagation();
    const delta = e.shiftKey ? -1 : 1;
    const lane = LANES[laneIdx];
    if (kind === 'current') {
      lane.current = Math.max(0, Math.min(5, lane.current + delta));
      // Ensure future >= current if not explicitly shifted
      if (!e.shiftKey && lane.future < lane.current) lane.future = lane.current;
    } else {
      lane.future = Math.max(0, Math.min(5, lane.future + delta));
      if (!e.shiftKey && lane.future < lane.current) lane.future = lane.current;
    }
    renderMagnets();
  });

  g.setAttribute('pointer-events', 'all');
  return g;
}

function makeArrow(x1, y1, x2, y2) {
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.setAttribute('pointer-events', 'none');

  // Mid-point arc
  const mx = (x1 + x2) / 2;
  const my = y1 - 18;
  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('d', `M ${x1 + R_CURRENT} ${y1} Q ${mx} ${my} ${x2 - R_FUTURE} ${y2}`);
  path.setAttribute('fill', 'none');
  path.setAttribute('stroke', '#00e5ff');
  path.setAttribute('stroke-width', '1.2');
  path.setAttribute('stroke-dasharray', '4,3');
  path.setAttribute('opacity', '0.45');

  // Arrowhead
  const ah = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
  const ax = x2 - R_FUTURE - 1;
  ah.setAttribute('points', `${ax},${y2-5} ${ax+10},${y2} ${ax},${y2+5}`);
  ah.setAttribute('fill', '#00e5ff');
  ah.setAttribute('opacity', '0.4');

  g.appendChild(path);
  g.appendChild(ah);
  return g;
}

// ══ LAYERS ══
function toggleLayer(id) {
  const btn = document.getElementById(`lb-${id}`);
  const el  = document.getElementById(`layer-${id}`);
  if (activeLayers.has(id)) {
    activeLayers.delete(id);
    el.style.display = 'none';
    btn.classList.remove('on');
  } else {
    activeLayers.add(id);
    el.style.display = '';
    btn.classList.add('on');
  }
}

// ══ MAGNETS TOGGLE ══
function toggleMagnets() {
  magnetsVisible = !magnetsVisible;
  document.getElementById('magnet-btn').textContent = magnetsVisible ? '⊕ Magneten' : '○ Magneten';
  document.getElementById('magnet-legend').style.display = magnetsVisible ? '' : 'none';
  renderMagnets();
}

// ══ ZOOM ══
function zoom(delta) {
  boardWidth = Math.max(MIN_W, Math.min(MAX_W, boardWidth + delta));
  document.getElementById('board-container').style.width = boardWidth + 'px';
  document.getElementById('zoom-pct').textContent = boardWidth + 'px';
}

// ══ TOOLTIP ══
const tip = document.getElementById('tooltip');
function showTooltip(e, msg) {
  tip.textContent = msg;
  tip.classList.add('vis');
  moveTooltip(e);
}
function moveTooltip(e) {
  tip.style.left = (e.clientX + 12) + 'px';
  tip.style.top  = (e.clientY - 28) + 'px';
}
function hideTooltip() {
  tip.classList.remove('vis');
}

// ══ INIT ══
document.getElementById('board-container').style.width = boardWidth + 'px';
renderMagnets();

// Handle img load to ensure overlay is sized correctly
const img = document.getElementById('base-img');
if (!img.complete) {
  img.onload = () => renderMagnets();
}
</script>
